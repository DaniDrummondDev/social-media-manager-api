###############################################################################
# Social Media Manager — Docker Compose
#
# Services:
#   app        — PHP 8.4-FPM (Laravel)
#   nginx      — Reverse proxy (:8080)
#   postgres   — PostgreSQL 17 + pgvector (:5432)
#   pgbouncer  — Connection pooling (:6432)
#   redis      — Cache/Queue/Rate-limiting/Sessions (:6379)
#   horizon    — Queue workers (7 filas, 15 workers)
#   scheduler  — Cron/scheduled tasks
#   ai-agents  — Python/LangGraph multi-agent AI pipelines (:8001)
#   minio      — S3-compatible storage (:9000/:9001)
#   mailpit    — Local SMTP (:8025)
###############################################################################

services:
  # ---------------------------------------------------------------------------
  # app — PHP 8.4-FPM (Laravel Application)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: smm-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      - PHP_FPM_PM=dynamic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # nginx — Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: smm-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # postgres — PostgreSQL 17 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: smm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    environment:
      POSTGRES_DB: ${DB_DATABASE:-social_media_manager}
      POSTGRES_USER: ${DB_USERNAME:-social_media}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-social_media} -d ${DB_DATABASE:-social_media_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # pgbouncer — Connection Pooling (transaction mode)
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: smm-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # redis — Cache (DB0), Queues (DB1), Rate-limiting (DB2), Sessions (DB3)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: smm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # horizon — Laravel Horizon (Queue Workers)
  #
  # Manages 7 queues with 15 total workers:
  #   publishing:3, high:2, default:3, analytics-sync:2,
  #   media-processing:2, notifications:2, low:1
  #
  # All 52+ background jobs are processed here.
  # Queue configuration is defined in config/horizon.php (Laravel side).
  # ---------------------------------------------------------------------------
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: smm-horizon
    restart: unless-stopped
    command: php artisan horizon
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # scheduler — Laravel Task Scheduler
  #
  # Runs 13+ scheduled commands:
  #   - Every minute: DispatchScheduledPosts
  #   - Every 5 min: CaptureComments
  #   - Hourly: RefreshExpiringTokens, CheckExpiredSubscriptions
  #   - Every 6 hours: SyncPostMetrics, SyncAccountMetrics
  #   - Daily: PurgeExpiredRecords, CheckSubscriptionGracePeriod
  #   - Weekly: CalculatePromptPerformance, GenerateOrgStyleProfile,
  #             CleanupExpiredLearningData, ValidatePredictionAccuracy,
  #             CleanupSuspendedOrgs
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: smm-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # ai-agents — Python/LangGraph Multi-Agent AI Pipelines
  #
  # Microservice for complex multi-agent AI pipelines:
  #   Content Creation, Content DNA, Social Listening, Visual Adaptation
  #
  # Communicates with Laravel via HTTP async (request → 202 → callback).
  # Uses Redis DB 4 for LangGraph checkpoints and job status.
  # Fallback: Laravel Prism single-shot via circuit breaker when unavailable.
  # Reference: ADR-021
  # ---------------------------------------------------------------------------
  ai-agents:
    build:
      context: ./ai-agents
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: smm-ai-agents
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://${DB_USERNAME:-social_media}:${DB_PASSWORD:-secret}@postgres:5432/${DB_DATABASE:-social_media_manager}
      - REDIS_URL=redis://redis:6379/4
      - CALLBACK_BASE_URL=http://nginx:80/api/v1/internal
      - INTERNAL_SECRET=${AI_AGENTS_INTERNAL_SECRET:-}
      - LOG_LEVEL=${AI_AGENTS_LOG_LEVEL:-info}
      - WORKERS=${AI_AGENTS_WORKERS:-2}
      - ENVIRONMENT=${APP_ENV:-local}
    ports:
      - "${AI_AGENTS_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./ai-agents:/app
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # minio — S3-compatible Object Storage (media, reports, exports)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    container_name: smm-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - social-media-net

  # ---------------------------------------------------------------------------
  # mailpit — Local SMTP for email testing
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit
    container_name: smm-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/api/v1/info || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - social-media-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  vendor_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  social-media-net:
    driver: bridge
