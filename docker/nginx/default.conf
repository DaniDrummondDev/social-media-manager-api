# Rate limiting zones
# SECURITY: Protects against DDoS and brute force attacks
limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_ai:10m rate=10r/m;
limit_req_status 429;

# CSP header - relaxed for Horizon dashboard (use $request_uri to match before rewrite)
map $request_uri $csp_header {
    ~^/horizon  "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; font-src 'self' https://fonts.bunny.net; img-src 'self' data:; connect-src 'self'";
    ~^/docs/api "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' data: https://unpkg.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
    default     "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 55m;

    # Security headers (applied via map for flexibility)
    # Base security headers for all responses
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Note: CSP is set per-location to allow Horizon dashboard

    # Hide nginx version
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types application/json application/vnd.api+json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Health check endpoint (no rate limiting)
    location = /ping {
        access_log off;
        return 200 "pong";
        add_header Content-Type text/plain;
    }

    # Authentication endpoints (strict rate limiting)
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=api_auth burst=3 nodelay;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # AI pipeline endpoints (moderate rate limiting)
    location ~ ^/api/v1/(content-ai|ai-intelligence)/ {
        limit_req zone=api_ai burst=5 nodelay;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # General API endpoints
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Default location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        limit_req zone=api_general burst=20 nodelay;

        # CSP based on URI (relaxed for /horizon, strict for API)
        add_header Content-Security-Policy $csp_header always;

        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 120s;
        fastcgi_read_timeout 120s;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|git|gitignore|htaccess|log|sql|bak|old|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
