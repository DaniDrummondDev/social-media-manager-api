###############################################################################
# PostgreSQL Configuration — Security Hardened for Production
#
# This file contains security-focused settings for PostgreSQL 17.
# SSL/TLS is enabled for encrypted connections (H8).
#
# NOTE: SSL certificates are auto-generated on first start in dev mode.
# For production, use proper CA-signed certificates.
###############################################################################

#------------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
#------------------------------------------------------------------------------

# Listen on all interfaces (within Docker network)
listen_addresses = '*'

# Maximum concurrent connections
max_connections = 200

# Authentication timeout
authentication_timeout = 30s

# Encrypted password storage
password_encryption = scram-sha-256

#------------------------------------------------------------------------------
# SSL/TLS CONFIGURATION (H8 - DB Connection Encryption)
#------------------------------------------------------------------------------

# Enable SSL for encrypted connections
ssl = on

# SSL certificate paths (auto-generated by PostgreSQL if not present)
# For production: replace with CA-signed certificates
ssl_cert_file = '/var/lib/postgresql/data/server.crt'
ssl_key_file = '/var/lib/postgresql/data/server.key'

# Minimum TLS version (TLS 1.2+)
ssl_min_protocol_version = 'TLSv1.2'

# Strong cipher suites only
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'

# Prefer server cipher order
ssl_prefer_server_ciphers = on

#------------------------------------------------------------------------------
# RESOURCE USAGE (Memory)
#------------------------------------------------------------------------------

# Shared memory for caching
shared_buffers = 256MB

# Memory per operation
work_mem = 16MB

# Memory for maintenance operations
maintenance_work_mem = 128MB

# Effective cache size (estimate of OS cache)
effective_cache_size = 768MB

#------------------------------------------------------------------------------
# WRITE-AHEAD LOG
#------------------------------------------------------------------------------

# Checkpoints
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min

# WAL level for replication readiness
wal_level = replica

#------------------------------------------------------------------------------
# QUERY TUNING
#------------------------------------------------------------------------------

# Random page cost (SSD optimized)
random_page_cost = 1.1

# Effective I/O concurrency (SSD)
effective_io_concurrency = 200

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

# Log destination
log_destination = 'stderr'

# What to log
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# Log level
log_min_messages = warning
log_min_error_statement = error

# Log slow queries (> 1 second)
log_min_duration_statement = 1000

# Log connections for audit trail
log_connections = on
log_disconnections = on

# Don't log passwords
log_statement = 'ddl'

#------------------------------------------------------------------------------
# SECURITY
#------------------------------------------------------------------------------

# Row security policies (RLS)
row_security = on

# Prevent accidental data exposure
default_transaction_isolation = 'read committed'

# Statement timeout (prevent runaway queries)
statement_timeout = 60000

# Lock timeout
lock_timeout = 10000

# Idle transaction timeout
idle_in_transaction_session_timeout = 300000
