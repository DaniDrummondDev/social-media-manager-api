[PHP]
;###############################################################################
; SECURITY HARDENING
;###############################################################################

; Hide PHP version from headers
expose_php = Off

; Disable dangerous functions
; Note: Some may be needed for specific packages - adjust as needed
disable_functions = exec,passthru,shell_exec,system,curl_multi_exec,parse_ini_file,show_source,dl

; Restrict file access to application directory
open_basedir = /var/www/html:/tmp

; Disable remote file operations (prevents RFI attacks)
allow_url_fopen = Off
allow_url_include = Off

;###############################################################################
; MEMORY & EXECUTION
;###############################################################################

memory_limit = 256M
max_execution_time = 120
max_input_time = 60
max_input_vars = 3000

;###############################################################################
; FILE UPLOADS
;###############################################################################

; Media uploads: images, videos
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

;###############################################################################
; ERROR HANDLING
;###############################################################################

; Never display errors in production
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php/error.log

; Don't expose PHP errors in output
html_errors = Off
xmlrpc_errors = Off

;###############################################################################
; SESSION SECURITY
;###############################################################################

session.save_handler = redis
; Redis URL with authentication
session.save_path = "tcp://redis:6379?auth=${REDIS_PASSWORD}&database=3"

; Session cookie security
session.cookie_httponly = On
session.cookie_secure = On
session.cookie_samesite = Strict
session.use_strict_mode = On
session.use_only_cookies = On

; Prevent session fixation
session.use_trans_sid = Off

; Session entropy
session.entropy_length = 32

;###############################################################################
; DATE & TIMEZONE
;###############################################################################

date.timezone = UTC

;###############################################################################
; OPCACHE (Production optimized)
;###############################################################################

[opcache]
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000

; DEV: validate timestamps so code changes are picked up without restart
; PRODUCTION: set to 0 for performance
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

opcache.save_comments = 1
opcache.fast_shutdown = 1

; JIT compilation (PHP 8.0+)
opcache.jit_buffer_size = 100M
opcache.jit = 1255

;###############################################################################
; REALPATH CACHE
;###############################################################################

realpath_cache_size = 4096K
realpath_cache_ttl = 600

;###############################################################################
; ASSERTIONS (disabled in production)
;###############################################################################

zend.assertions = -1
assert.active = Off

;###############################################################################
; MISC SECURITY
;###############################################################################

; Limit PCRE recursion to prevent DoS
pcre.recursion_limit = 100000
pcre.backtrack_limit = 1000000

; SQL safe mode
sql.safe_mode = Off

; Prevent path disclosure
cgi.fix_pathinfo = 0
