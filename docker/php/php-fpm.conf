[www]
user = appuser
group = appuser

listen = 9000

; Process manager
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; Status page (for health checks)
pm.status_path = /status
ping.path = /ping
ping.response = pong

; Logging
catch_workers_output = yes
decorate_workers_output = no

; Timeouts
request_terminate_timeout = 120s
